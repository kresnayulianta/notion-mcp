defaultWorkspace: personal
apiVersion: "2022-06-28"

workspaces:
  personal:
    tokenEnv: NOTION_TOKEN_PERSONAL
    targets:
      tasks:
        data_source_id: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
        database_id: "11111111-2222-3333-4444-555555555555"
        propertyAliases:
          title: Task
          status: Status
          due_date: Due
          notes: Notes
          priority: Priority
          url: URL
          assignees: Assignee
      knowledge:
        data_source_id: "ffffffff-1111-2222-3333-444444444444"
        propertyAliases:
          title: Name
          notes: Summary
          url: Source URL
          tags: Tags
  work:
    tokenEnv: NOTION_TOKEN_WORK
    targets:
      roadmap:
        data_source_id: "12345678-1234-1234-1234-123456789012"
        propertyAliases:
          title: Item
          status: Status
          notes: Context
